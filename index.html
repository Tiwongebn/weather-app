<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width-device-width, initial-scale.0">
        <title>Weather App - Easy Tutorials</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card">
            <div class="search">
                <input type="text" placeholder="enter city name"
                spellcheck="false">
                <button><img src="images/search.png"></button>

            </div>
            <div class="weather">
                <img src="images/rain.png" class="weather-icon">
                <h1 class="temp">22°c</h1>
                <h2 class="city">Johannesburg</h2>
                <div class="details">
                <div class="col">
                    <img src="images/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p> 
                    </div>
                </div>
            </div>  
            </div>
        </div>
       <script>
const searchBox = document.querySelector(".search input");
const searchBtn = document.querySelector(".search button");
const weatherIcon = document.querySelector(".weather-icon");

// 1. Convert city name → coordinates
async function getCoordinates(city) {
  const res = await fetch(
    `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
  );
  const data = await res.json();

  if (!data.results || data.results.length === 0) {
    alert("City not found");
    return null;
  }

  return {
    name: data.results[0].name,
    lat: data.results[0].latitude,
    lon: data.results[0].longitude,
  };
}

// 2. Get weather using coordinates
async function getWeather(lat, lon) {
  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m`
  );
  return await res.json();
}

// 3. Main function
async function checkWeather(city) {
  const location = await getCoordinates(city);
  if (!location) return;

  const weatherData = await getWeather(location.lat, location.lon);

  const current = weatherData.current_weather;

  document.querySelector(".city").innerHTML = location.name;
  document.querySelector(".temp").innerHTML = Math.round(current.temperature) + "°C";
  document.querySelector(".wind").innerHTML = current.windspeed + " km/h";

  // humidity (approx from hourly)
  const humidity = weatherData.hourly.relativehumidity_2m[0];
  document.querySelector(".humidity").innerHTML = humidity + "%";

  // Weather icons (based on weathercode)
  const code = current.weathercode;

  if (code === 0) {
    weatherIcon.src = "images/clear.png";
  } else if (code <= 3) {
    weatherIcon.src = "images/clouds.png";
  } else if (code <= 67) {
    weatherIcon.src = "images/rain.png";
  } else if (code <= 77) {
    weatherIcon.src = "images/snow.png";
  } else {
    weatherIcon.src = "images/mist.png";
  }

  document.querySelector(".weather").style.display = "block";
}

// Event
searchBtn.addEventListener("click", () => {
  checkWeather(searchBox.value);
});
</script>
    </body>
</html>
