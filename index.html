<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width-device-width, initial-scale.0">
        <title>Weather App - Easy Tutorials</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card">
            <div class="search">
                <input type="text" placeholder="enter city name"
                spellcheck="false">
                <button><img src="images/search.png"></button>
                <ul id="suggestions" class="suggestions-list"></ul>
            </div>
        
            <div class="weather">
                <img src="images/rain.png" class="weather-icon">
                <h1 class="temp">22°c</h1>
                <h2 class="city">Johannesburg</h2>
                <div class="details">
                <div class="col">
                    <img src="images/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p> 
                    </div>
                </div>
            </div>  
            </div>
        </div>
       <script>
const searchBox = document.querySelector(".search input");
const searchBtn = document.querySelector(".search button");
const weatherIcon = document.querySelector(".weather-icon");
const suggestionsList = document.getElementById("suggestions");
const card = document.querySelector(".card");
let debounceTimer;

searchBox.addEventListener("input", () => {
    const query = searchBox.value.trim();
    
    clearTimeout(debounceTimer);
    if (query.length < 2) {
        suggestionsList.style.display = "none";
        return;
    }

    // Wait 300ms after last keystroke to call API
    debounceTimer = setTimeout(async () => {
        const res = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${query}&count=5`
        );
        const data = await res.json();

        if (data.results) {
            displaySuggestions(data.results);
        }
    }, 300);
});

function displaySuggestions(cities) {
    suggestionsList.innerHTML = ""; // Clear old suggestions
    suggestionsList.style.display = "block";

    cities.forEach(city => {
        const li = document.createElement("li");
        // Format: City Name, Admin Area, Country
        li.textContent = `${city.name}, ${city.admin1 || ""} (${city.country_code})`;
        
        li.addEventListener("click", () => {
            searchBox.value = city.name;
            suggestionsList.style.display = "none";
            checkWeather({ latitude: city.latitude, longitude: city.longitude, name: city.name });
        });
        
        suggestionsList.appendChild(li);
    });
}

function getWeatherTheme(code) {
    if (code === 0) return "clear";
    if (code <= 3) return "clouds";
    if (code <= 67) return "rain";
    if (code <= 77) return "snow";
    return "mist";
}

function updateDynamicBackground(isDay, code) {
    const periodClass = isDay ? "day" : "night";
    const weatherClass = getWeatherTheme(code);

    document.body.classList.remove("day", "night");
    document.body.classList.add(periodClass);

    card.classList.remove(
        "day-clear", "day-clouds", "day-rain", "day-snow", "day-mist",
        "night-clear", "night-clouds", "night-rain", "night-snow", "night-mist"
    );
    card.classList.add(`${periodClass}-${weatherClass}`);
}

function updateUI(cityName, weatherData) {
    const current = weatherData.current_weather;
    const humidity = weatherData.hourly.relativehumidity_2m[0];
    const code = current.weathercode;
    const isDay = current.is_day === 1;

    // Update Text Content
    document.querySelector(".city").innerHTML = cityName;
    document.querySelector(".temp").innerHTML = Math.round(current.temperature) + "°C";
    document.querySelector(".wind").innerHTML = current.windspeed + " km/h";
    document.querySelector(".humidity").innerHTML = humidity + "%";

    // Update Icon
    if (code === 0) {
        weatherIcon.src = "images/clear.png";
    } else if (code <= 3) {
        weatherIcon.src = "images/clouds.png";
    } else if (code <= 67) {
        weatherIcon.src = "images/rain.png";
    } else if (code <= 77) {
        weatherIcon.src = "images/snow.png";
    } else {
        weatherIcon.src = "images/mist.png";
    }

      // Update background by day/night and weather
    updateDynamicBackground(isDay, code);

    // Show the weather card
    document.querySelector(".weather").style.display = "block";
}
// 1. Convert city name → coordinates
async function getCoordinates(city) {
    try {
  const res = await fetch(
    `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
  );
  const data = await res.json();

  if (!data.results || data.results.length === 0) {
    alert("City not found");
    return null;
  }

  return {
    name: data.results[0].name,
    lat: data.results[0].latitude,
    lon: data.results[0].longitude,
  };
  } catch (error) {
    console.error("Error fetching coordinates:", error);
    alert("Something went wrong. Check your internet connection.");
  }
}

// 2. Get weather using coordinates
async function getWeather(lat, lon) {
  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m`
  );
  return await res.json();
}

// 3. Main function
async function checkWeather(input) {
    let lat, lon, cityName;

    try {
        if (typeof input === "object") {
            // Data from the suggestions list
            lat = input.latitude;
            lon = input.longitude;
            cityName = input.name;
        } else {
            // Data from manual text entry
            const location = await getCoordinates(input);
            if (!location) return;
            lat = location.lat;
            lon = location.lon;
            cityName = location.name;
        }

        const weatherData = await getWeather(lat, lon);
        
        // Hand off the data to the UI function
        updateUI(cityName, weatherData);

    } catch (error) {
        console.error("Failed to fetch weather:", error);
    }
}
// Event
searchBtn.addEventListener("click", () => {
  checkWeather(searchBox.value);
  searchBox.value = "";
});

searchBox.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        checkWeather(searchBox.value);
    }
});
</script>
    </body>
</html>
